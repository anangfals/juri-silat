<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kejuaraan PSHT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#000;color:#fff;height:100vh;overflow:hidden}
.header{background:#6b21a8;text-align:center;padding:10px;font-size:24px;font-weight:bold}
.container{display:flex;height:calc(100vh - 60px);gap:10px;padding:10px}
.col{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px;border-radius:15px;border:3px solid}
.biru{border-color:#3b82f6}
.merah{border-color:#ef4444}
.tengah{border-color:#a855f7}
.title{font-size:32px;font-weight:900;margin-bottom:10px}
.score{font-size:120px;font-weight:900;margin:20px 0}
.btn-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:90%;margin-top:10px}
.btn{padding:15px;font-size:16px;border:none;border-radius:10px;cursor:pointer;background:#222;color:#fff;border:1px solid #555}
.btn:active{background:#444}
.timer{font-size:80px;font-weight:900;color:#ffd700;margin:20px 0}
.babak-btn{width:90%;padding:15px;margin:8px 0;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer;background:#222;color:#fff;border:1px solid #555}
.babak-btn.active{background:#7c3aed}
.btn-mulai{background:#3b82f6}
.btn-reset{background:#ef4444}
.settings-btn{position:fixed;top:10px;right:10px;background:#222;border:2px solid #555;border-radius:50%;width:50px;height:50px;font-size:24px;cursor:pointer;z-index:1001}
.settings-panel{position:fixed;top:70px;right:10px;background:#111;padding:20px;border-radius:15px;border:2px solid #333;z-index:1000;display:none;width:250px}
.settings-panel.active{display:block}
input{width:90%;padding:12px;margin:5px 0;background:#111;border:2px solid #444;border-radius:8px;color:#fff;font-size:16px;text-align:center}
.status{position:fixed;bottom:10px;left:10px;font-size:14px;color:#22c55e}
.mode-display.settings-btn,.mode-display.settings-panel,.mode-display.btn,.mode-display input{display:none!important}
</style>
</head>
<body>
<div class="header">KEJUARAAN PENCAT SILAT PSHT HALMAHERA SELATAN</div>

<div class="container">
  <div class="col biru">
    <div class="title">BIRU</div>
    <div class="score" id="scoreBiru">0</div>
    <input id="namaBiru" placeholder="NAMA ATLET BIRU" onblur="saveNama()">
    <div class="btn-grid">
      <button class="btn" onclick="addScore('biru',1)">+1</button>
      <button class="btn" onclick="addScore('biru',2)">+2</button>
      <button class="btn" onclick="addScore('biru',3)">+3</button>
    </div>
  </div>

  <div class="col tengah">
    <div class="timer" id="timer">03:00</div>
    <button class="babak-btn active" onclick="setBabak(1)">BABAK 1</button>
    <button class="babak-btn" onclick="setBabak(2)">BABAK 2</button>
    <button class="babak-btn" onclick="setBabak(3)">BABAK 3</button>
    <button class="babak-btn btn-mulai" id="btnMulai" onclick="toggleTimer()">MULAI</button>
    <button class="babak-btn btn-reset" onclick="resetAll()">RESET</button>
  </div>

  <div class="col merah">
    <div class="title">MERAH</div>
    <div class="score" id="scoreMerah">0</div>
    <input id="namaMerah" placeholder="NAMA ATLET MERAH" onblur="saveNama()">
    <div class="btn-grid">
      <button class="btn" onclick="addScore('merah',1)">+1</button>
      <button class="btn" onclick="addScore('merah',2)">+2</button>
      <button class="btn" onclick="addScore('merah',3)">+3</button>
    </div>
  </div>
</div>

<button class="settings-btn" onclick="toggleSettings()">⚙️</button>
<div class="settings-panel" id="settingsPanel">
  <select id="modeSelect">
    <option value="juri">MODE JURI</option>
    <option value="display">MODE DISPLAY</option>
  </select>
  <button onclick="saveMode()">SIMPAN</button>
</div>

<div class="status" id="status">Connecting...</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, onValue, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const app = initializeApp({databaseURL: "https://juri-silat-psht-by-4n4n9-default-rtdb.asia-southeast1.firebasedatabase.app/"});
const db = getDatabase(app);
const dataRef = ref(db, 'match');

let mode = localStorage.getItem('juriMode') || 'juri';
let timerInterval = null;
let isRunning = false;

document.getElementById('modeSelect').value = mode;
if(mode === 'display') document.body.classList.add('mode-display');

window.toggleSettings = () => document.getElementById('settingsPanel').classList.toggle('active');
window.saveMode = () => {localStorage.setItem('juriMode', document.getElementById('modeSelect').value); location.reload();}

onValue(dataRef, (snap) => {
  const d = snap.val() || {biru:0,merah:0,timer:180,babak:1};
  document.getElementById('scoreBiru').textContent = d.biru;
  document.getElementById('scoreMerah').textContent = d.merah;
  let m = Math.floor(d.timer/60);
  let s = d.timer%60;
  document.getElementById('timer').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  document.getElementById('status').textContent = '✓ Online';
});

window.addScore = async (warna, nilai) => {
  const snap = await get(ref(db, 'match'));
  const d = snap.val() || {biru:0,merah:0};
  update(dataRef, {[warna]: d[warna] + nilai});
}

window.toggleTimer = () => {
  isRunning =!isRunning;
  document.getElementById('btnMulai').textContent = isRunning? 'PAUSE' : 'MULAI';
  if(isRunning) {
    timerInterval = setInterval(async () => {
      const snap = await get(ref(db, 'match'));
      let t = snap.val().timer;
      if(t > 0) update(dataRef, {timer: t - 1});
      else {clearInterval(timerInterval); isRunning = false; document.getElementById('btnMulai').textContent = 'MULAI';}
    }, 1000);
  } else clearInterval(timerInterval);
}

window.resetAll = () => {clearInterval(timerInterval); isRunning = false; update(dataRef, {biru:0,merah:0,timer:180,babak:1}); document.getElementById('btnMulai').textContent = 'MULAI';}
window.setBabak = (n) => update(dataRef, {babak: n});
window.saveNama = () => {};
</script>
</body>
</html>

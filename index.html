<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juri Silat Pro</title>
<style>
body{margin:0;background:#0a0a0a;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
h1{font-size:1.8rem;margin-bottom:20px;color:#9b5de5;text-align:center}
h1 img{height:45px;vertical-align:middle;margin-right:12px}
.container{display:flex;gap:30px;align-items:center}
.box{width:220px;height:220px;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.1rem;font-weight:bold;box-shadow:0 0 25px rgba(255,255,255,0.1)}
.biru{background:#0077b6}
.merah{background:#d00000}
.timer{font-size:3.5rem;font-weight:bold;color:#00f5d4;text-align:center}
.timer img{width:90px;height:90px;border-radius:50%;border:4px solid #00f5d4;display:block;margin:0 auto 15px}
.btn{margin-top:12px;padding:10px 20px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;font-size:1rem}
.btn-juri{background:#333;color:#fff}
.btn-reset{background:#555;color:#fff;margin-top:15px}
.score{font-size:4rem;margin:10px 0}
.whatsapp{margin-top:25px;padding:12px 25px;background:#25D366;border:none;border-radius:12px;color:#fff;font-size:1.1rem;font-weight:bold;cursor:pointer}
</style>
</head>
<body>

<h1>
  <img src="logo.png" alt="Logo">
  KEJUARAAN PENCAT SILAT PSHT HALMAHERA SELATAN
</h1>

<div class="container">
  <div class="box biru">
    <img src="biru.jpg" alt="Atlet Biru" style="width:90px;height:90px;border-radius:50%;border:4px solid #00b4d8;margin-bottom:10px;object-fit:cover">
    <div>NAMA ATLET BIRU</div>
    <div class="score" id="skorBiru">0</div>
    <button class="btn btn-juri" onclick="tambahSkor('biru',1)">JURI 1</button>
    <button class="btn btn-juri" onclick="tambahSkor('biru',2)">JURI 2</button>
    <button class="btn btn-juri" onclick="tambahSkor('biru',3)">JURI 3</button>
  </div>

  <div class="timer">
    <img src="logo.png" alt="Logo Timer">
    <div id="timer">02:00</div>
    <button class="btn btn-reset" onclick="resetTimer()">RESET TIMER</button>
  </div>

  <div class="box merah">
    <img src="merah.jpg" alt="Atlet Merah" style="width:90px;height:90px;border-radius:50%;border:4px solid #ff4d6d;margin-bottom:10px;object-fit:cover">
    <div>NAMA ATLET MERAH</div>
    <div class="score" id="skorMerah">0</div>
    <button class="btn btn-juri" onclick="tambahSkor('merah',1)">JURI 1</button>
    <button class="btn btn-juri" onclick="tambahSkor('merah',2)">JURI 2</button>
    <button class="btn btn-juri" onclick="tambahSkor('merah',3)">JURI 3</button>
  </div>
</div>

<button class="whatsapp" onclick="kirimWA()">KIRIM SKOR KE WA</button>

<script>
let skorBiru=0, skorMerah=0, waktu=120, jalan=false;
function tambahSkor(warna,juri){if(warna==='biru')skorBiru++;else skorMerah++;document.getElementById('skorBiru').innerText=skorBiru;document.getElementById('skorMerah').innerText=skorMerah}
function resetTimer(){waktu=120;jalan=false;updateTimer()}
function updateTimer(){let m=Math.floor(waktu/60),s=waktu%60;document.getElementById('timer').innerText=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`}
setInterval(()=>{if(jalan&&waktu>0){waktu--;updateTimer()}},1000)
document.getElementById('timer').onclick=()=>{jalan=!jalan}
function kirimWA(){let text=`SKOR AKHIR%0A%0ABIRU: ${skorBiru}%0AMERAH: ${skorMerah}%0AWAKTU: ${document.getElementById('timer').innerText}`;window.open(`https://wa.me/?text=${text}`)}
updateTimer();
</script>

</body>
</html>

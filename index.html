<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juri Silat PSHT Realtime</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
  body{background:#0a0a0a;color:#fff;overflow-x:hidden}
 .container{max-width:900px;margin:0 auto;padding:20px}
  h1{text-align:center;font-size:2.5rem;margin-bottom:10px;background:linear-gradient(90deg,#ff6b6b,#ffd93d);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
 .subtitle{text-align:center;color:#888;margin-bottom:30px}
 .settings{position:fixed;top:20px;right:20px;background:#1a1a1a;padding:15px;border-radius:10px;border:1px solid #333;z-index:1000}
 .settings select,.settings button{width:100%;padding:8px;margin-top:8px;background:#2a2a2a;color:#fff;border:1px solid #444;border-radius:5px}
 .mode-display.settings{display:none}
 .score-board{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:center;margin-top:50px}
 .corner{background:linear-gradient(135deg,#1e3a8a,#3b82f6);padding:30px;border-radius:20px;text-align:center;border:3px solid #60a5fa}
 .corner.merah{background:linear-gradient(135deg,#7f1d1d,#dc2626);border-color:#f87171}
 .label{font-size:1.5rem;font-weight:bold;margin-bottom:15px}
 .score{font-size:8rem;font-weight:900;line-height:1}
 .buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
 .btn{padding:20px;font-size:2rem;font-weight:bold;border:none;border-radius:15px;cursor:pointer;transition:0.2s}
 .btn:active{transform:scale(0.95)}
 .btn-plus{background:#22c55e;color:#fff}
 .btn-minus{background:#ef4444;color:#fff}
 .vs{font-size:4rem;font-weight:900;color:#ffd93d}
 .controls{text-align:center;margin-top:40px}
 .btn-reset{background:#f59e0b;color:#000;padding:15px 40px;font-size:1.2rem;border:none;border-radius:10px;cursor:pointer;font-weight:bold}
 .status{position:fixed;bottom:20px;left:20px;font-size:0.9rem;color:#22c55e}
 .mode-display.btn{display:none}
  @media(max-width:768px){.score{font-size:5rem}.vs{font-size:2.5rem}.score-board{gap:10px}}
</style>
</head>
<body>
<div class="container">
  <h1>JURI SILAT PSHT</h1>
  <div class="subtitle">Realtime Scoreboard - 3 Juri + 1 Display</div>

  <div class="settings">
    <label>Pilih Mode HP:</label>
    <select id="modeSelect">
      <option value="juri1">MODE JURI 1 - Merah</option>
      <option value="juri2">MODE JURI 2 - Biru</option>
      <option value="juri3">MODE JURI 3 - Merah</option>
      <option value="display">MODE DISPLAY/LAYAR</option>
    </select>
    <button onclick="saveMode()">SIMPAN MODE</button>
  </div>

  <div class="score-board">
    <div class="corner merah">
      <div class="label">MERAH</div>
      <div class="score" id="scoreMerah">0</div>
      <div class="buttons" id="btnMerah">
        <button class="btn btn-plus" onclick="addScore('merah',1)">+1</button>
        <button class="btn btn-minus" onclick="addScore('merah',-1)">-1</button>
      </div>
    </div>

    <div class="vs">VS</div>

    <div class="corner">
      <div class="label">BIRU</div>
      <div class="score" id="scoreBiru">0</div>
      <div class="buttons" id="btnBiru">
        <button class="btn btn-plus" onclick="addScore('biru',1)">+1</button>
        <button class="btn btn-minus" onclick="addScore('biru',-1)">-1</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-reset" onclick="resetScore()">RESET SCORE</button>
  </div>
</div>

<div class="status" id="status">Menghubungkan...</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, onValue, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  databaseURL: "https://juri-silat-psht-by-4n4n9-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const scoreRef = ref(db, 'score');

// Load mode dari localStorage
let mode = localStorage.getItem('juriMode') || 'juri1';
document.getElementById('modeSelect').value = mode;
applyMode();

function applyMode() {
  if(mode === 'display') {
    document.body.classList.add('mode-display');
  } else {
    document.body.classList.remove('mode-display');
    // Atur tombol sesuai juri
    const btnMerah = document.getElementById('btnMerah');
    const btnBiru = document.getElementById('btnBiru');
    if(mode === 'juri1') {
      btnMerah.style.display = 'grid';
      btnBiru.style.display = 'none';
    } else if(mode === 'juri2') {
      btnMerah.style.display = 'none';
      btnBiru.style.display = 'grid';
    } else if(mode === 'juri3') {
      btnMerah.style.display = 'grid';
      btnBiru.style.display = 'none';
    }
  }
}

window.saveMode = function() {
  mode = document.getElementById('modeSelect').value;
  localStorage.setItem('juriMode', mode);
  applyMode();
  alert('Mode disimpan: ' + mode.toUpperCase());
}

// Listen realtime ke Firebase
onValue(scoreRef, (snapshot) => {
  const data = snapshot.val() || {merah: 0, biru: 0};
  document.getElementById('scoreMerah').textContent = data.merah;
  document.getElementById('scoreBiru').textContent = data.biru;
  document.getElementById('status').textContent = '✓ Terhubung Realtime';
  document.getElementById('status').style.color = '#22c55e';
});

// Fungsi tambah/kurang score
window.addScore = function(warna, nilai) {
  onValue(scoreRef, (snapshot) => {
    const data = snapshot.val() || {merah: 0, biru: 0};
    let newScore = data[warna] + nilai;
    if(newScore < 0) newScore = 0;
    update(scoreRef, {[warna]: newScore});
  }, {onlyOnce: true});
}

window.resetScore = function() {
  if(confirm('Reset score ke 0-0?')) {
    update(scoreRef, {merah: 0, biru: 0});
  }
}
</script>
</body>
</html>

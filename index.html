<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juri Silat Pro - Discors Style</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
body { 
    background: #0a0a1a; 
    color: white; 
    overflow-x: hidden;
    background-image: radial-gradient(circle at center, #1a1a3a 0%, #0a0a1a 100%);
}
.header {
    text-align: center;
    padding: 15px;
    background: linear-gradient(90deg, #4a00e0, #8e2de2);
}
.header h1 { font-size: 1.3rem; color: #ff88ff; text-shadow: 0 0 10px #ff00ff; }
.header h2 { font-size: 1.1rem; color: #ffdd55; margin-top: 5px; }

.container {
    display: grid;
    grid-template-columns: 1fr 300px 1fr;
    gap: 15px;
    padding: 20px;
    min-height: 80vh;
}

.biru, .merah {
    background: rgba(0,0,0,0.6);
    border-radius: 15px;
    padding: 20px;
    border: 2px solid;
    backdrop-filter: blur(10px);
}
.biru { border-color: #00aaff; box-shadow: 0 0 30px rgba(0,170,255,0.3); }
.merah { border-color: #ff3333; box-shadow: 0 0 30px rgba(255,51,51,0.3); }

.corner-logo {
    position: absolute;
    top: 10px;
    width: 40px;
    opacity: 0.3;
}
.biru .corner-logo { left: 10px; }
.merah .corner-logo { right: 10px; }

.judul { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; }
.biru .judul { color: #00aaff; }
.merah .judul { color: #ff3333; text-align: right; }

.score {
    font-size: 8rem;
    font-weight: bold;
    text-align: center;
    margin: 40px 0;
    text-shadow: 0 0 30px currentColor;
}
.biru .score { color: #00ddff; }
.merah .score { color: #ff5555; }

.atlet {
    background: linear-gradient(90deg, rgba(0,170,255,0.3), transparent);
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}
.merah .atlet {
    background: linear-gradient(90deg, transparent, rgba(255,51,51,0.3));
    text-align: right;
}
.atlet .nama { font-size: 1.1rem; font-weight: bold; }
.atlet .perguruan { font-size: 0.9rem; opacity: 0.8; margin-top: 5px; }

.tombol-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 15px;
}
.tombol {
    padding: 15px 5px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 0.9rem;
    cursor: pointer;
    transition: 0.2s;
}
.tombol:active { transform: scale(0.95); }
.biru .tombol:hover { background: #00aaff; }
.merah .tombol:hover { background: #ff3333; }

.juri-btn {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
}
.juri-btn button {
    padding: 8px;
    font-size: 0.8rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.tengah {
    background: rgba(20,20,40,0.8);
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    border: 2px solid #8e2de2;
}
.logo-discors {
    width: 80px;
    margin: 10px auto;
    filter: brightness(0) invert(1);
}
.timer {
    font-size: 4rem;
    font-weight: bold;
    color: #ffdd00;
    margin: 20px 0;
    text-shadow: 0 0 20px #ffaa00;
    .timer img{
  width:70px;
  height:70px;
  border-radius:50%;
  border:3px solid #00f5d4;
  object-fit:cover;
  margin-bottom:8px;
  box-shadow:0 0 15px #00f5d4;
}
}
.babak-btn {
    width: 100%;
    padding: 12px;
    margin: 5px 0;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
}
.babak-btn.aktif {
    background: linear-gradient(90deg, #8e2de2, #4a00e0);
    box-shadow: 0 0 15px #8e2de2;
}
.control-btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #00aaff;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
.reset-btn { background: #ff3333; margin-top: 5px; }

@media (max-width: 768px) {
    .container { grid-template-columns: 1fr; }
    .tengah { order: -1; }
    .score { font-size: 5rem; }
    .timer { font-size: 3rem; }
}
</style>
</head>
<body>

<div class="header">
    <h1>KEJUARAAN PENCAT SILAT PSHT HALMAHERA SELATAN </h1>
    <h2>2026</h2>
</div>

<div class="container">
    <!-- BIRU -->
    <div class="biru">
        <img src="data:image/jpeg;base64,[LOGO_IPSI_BASE64]" class="corner-logo">
        <div class="judul">BIRU</div>
        <div class="score" id="score-biru">0</div>
        <div class="atlet">
            <div class="nama" id="nama-biru">NAMA ATLET BIRU</div>
            <div class="perguruan" id="perguruan-biru">NAMA PERGURUAN</div>
        </div>
        <div class="tombol-grid">
            <button class="tombol" onclick="addScore('biru', 1)">Serangan Tangan</button>
            <button class="tombol" onclick="addScore('biru', 2)">Tendangan</button>
            <button class="tombol" onclick="addScore('biru', 3)">Bantingan</button>
        </div>
        <div class="juri-btn">
            <button onclick="juriVote('biru', 1)">JURI 1</button>
            <button onclick="juriVote('biru', 2)">JURI 2</button>
            <button onclick="juriVote('biru', 3)">JURI 3</button>
        </div>
    </div>

    <!-- TENGAH -->
    <div class="tengah">
        <img src="data:image/jpeg;base64,[LOGO_IPSI_BASE64]" class="logo-discors">
        <div style="font-size:0.9rem; opacity:0.7">TIMER</div>
        <div class="timer" id="timer">02:00</div>
        <div style="font-size:0.8rem; opacity:0.7; margin-bottom:10px">BABAK AKTIF</div>
        <button class="babak-btn aktif" onclick="setBabak(1)">BABAK 1</button>
        <button class="babak-btn" onclick="setBabak(2)">BABAK 2</button>
        <button class="babak-btn" onclick="setBabak(3)">BABAK 3</button>
        <button class="control-btn" onclick="startTimer()">MULAI</button>
        <button class="control-btn reset-btn" onclick="resetAll()">RESET</button>
        <button class="control-btn" onclick="kirimWA()" style="background:#25D366">KIRIM WA</button>
    </div>

    <!-- MERAH -->
    <div class="merah">
        <img src="data:image/jpeg;base64,[LOGO_IPSI_BASE64]" class="corner-logo">
        <div class="judul">MERAH</div>
        <div class="score" id="score-merah">0</div>
        <div class="atlet">
            <div class="nama" id="nama-merah">NAMA ATLET MERAH</div>
            <div class="perguruan" id="perguruan-merah">NAMA PERGURUAN</div>
        </div>
        <div class="tombol-grid">
            <button class="tombol" onclick="addScore('merah', 1)">Serangan Tangan</button>
            <button class="tombol" onclick="addScore('merah', 2)">Tendangan</button>
            <button class="tombol" onclick="addScore('merah', 3)">Bantingan</button>
        </div>
        <div class="juri-btn">
            <button onclick="juriVote('merah', 1)">JURI 1</button>
            <button onclick="juriVote('merah', 2)">JURI 2</button>
            <button onclick="juriVote('merah', 3)">JURI 3</button>
        </div>
    </div>
</div>

<script>
let scoreBiru = 0, scoreMerah = 0;
let babak = 1;
let timerInterval, detik = 120;

function addScore(warna, poin) {
    if(warna === 'biru') {
        scoreBiru += poin;
        document.getElementById('score-biru').textContent = scoreBiru;
    } else {
        scoreMerah += poin;
        document.getElementById('score-merah').textContent = scoreMerah;
    }
}

function juriVote(warna, juri) {
    alert('JURI ' + juri + ' vote untuk ' + warna.toUpperCase());
}

function setBabak(n) {
    babak = n;
    document.querySelectorAll('.babak-btn').forEach(btn => btn.classList.remove('aktif'));
    document.querySelectorAll('.babak-btn')[n-1].classList.add('aktif');
}

function startTimer() {
    if(timerInterval) clearInterval(timerInterval);
    detik = 120;
    timerInterval = setInterval(() => {
        detik--;
        let m = Math.floor(detik/60).toString().padStart(2,'0');
        let s = (detik%60).toString().padStart(2,'0');
        document.getElementById('timer').textContent = m + ':' + s;
        if(detik <= 0) clearInterval(timerInterval);
    }, 1000);
}

function resetAll() {
    scoreBiru = scoreMerah = 0;
    detik = 120;
    clearInterval(timerInterval);
    document.getElementById('score-biru').textContent = 0;
    document.getElementById('score-merah').textContent = 0;
    document.getElementById('timer').textContent = '02:00';
}

function kirimWA() {
    let namaBiru = document.getElementById('nama-biru').textContent;
    let namaMerah = document.getElementById('nama-merah').textContent;
    let pesan = `Hasil Babak ${babak}%0A%0ABIRU: ${namaBiru} - ${scoreBiru}%0AMERAH: ${namaMerah} - ${scoreMerah}`;
    window.open('https://wa.me/?text=' + pesan);
}

// Klik nama buat ganti
document.getElementById('nama-biru').onclick = () => {
    let n = prompt('Nama Atlet Biru:', document.getElementById('nama-biru').textContent);
    if(n) document.getElementById('nama-biru').textContent = n;
}
document.getElementById('perguruan-biru').onclick = () => {
    let p = prompt('Perguruan Biru:', document.getElementById('perguruan-biru').textContent);
    if(p) document.getElementById('perguruan-biru').textContent = p;
}
document.getElementById('nama-merah').onclick = () => {
    let n = prompt('Nama Atlet Merah:', document.getElementById('nama-merah').textContent);
    if(n) document.getElementById('nama-merah').textContent = n;
}
document.getElementById('perguruan-merah').onclick = () => {
    let p = prompt('Perguruan Merah:', document.getElementById('perguruan-merah').textContent);
    if(p) document.getElementById('perguruan-merah').textContent = p;
}
</script>
</body>
</html>

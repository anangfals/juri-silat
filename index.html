<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSHT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#000;color:#fff;height:100vh;overflow:hidden}
.header{background:#6b21a8;text-align:center;padding:10px;font-size:20px;font-weight:bold;display:flex;align-items:center;justify-content:center;gap:15px}
.header img{height:40px}
.container{display:flex;height:calc(100vh - 60px);gap:10px;padding:10px}
.col{flex:1;display:flex;flex-direction:column;align-items:center;padding:15px;border-radius:15px;border:3px solid}
.biru{border-color:#3b82f6}
.merah{border-color:#ef4444}
.tengah{border-color:#a855f7}

.label-warna{font-size:22px;font-weight:900;margin-bottom:8px;letter-spacing:3px}
.biru.label-warna{color:#3b82f6}
.merah.label-warna{color:#ef4444}

.atlet-foto{width:120px;height:120px;border-radius:50%;border:3px solid #555;object-fit:cover;background:#222;margin-bottom:10px}
.title{font-size:28px;font-weight:900;margin:5px 0}
.perguruan{font-size:14px;color:#aaa;margin-bottom:10px;text-align:center}
.score{font-size:100px;font-weight:900;margin:15px 0}
.btn-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;margin-top:10px}
.btn{padding:15px;font-size:18px;border:none;border-radius:10px;cursor:pointer;background:#222;color:#fff;border:1px solid #555}
.btn:active{background:#444}
.timer{font-size:70px;font-weight:900;color:#ffd700;margin:15px 0}
.babak-btn{width:100%;padding:12px;margin:6px 0;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;background:#222;color:#fff;border:1px solid #555}
.babak-btn.active{background:#7c3aed}
.btn-mulai{background:#3b82f6}
.btn-reset{background:#ef4444}
.settings-btn{position:fixed;top:10px;right:10px;background:#222;border:2px solid #555;border-radius:50%;width:50px;height:50px;font-size:24px;cursor:pointer;z-index:1001}
.settings-panel{position:fixed;top:70px;right:10px;background:#111;padding:20px;border-radius:15px;border:2px solid #333;z-index:1000;display:none;width:320px;max-height:80vh;overflow-y:auto}
.settings-panel.active{display:block}
.settings-panel h3{margin:10px 0 5px 0;font-size:16px;color:#ffd700}
input{width:100%;padding:10px;margin:5px 0;background:#222;border:2px solid #444;border-radius:8px;color:#fff;font-size:14px}
input[type="file"]{font-size:12px}
input[type="file"]::file-selector-button{padding:5px 10px;background:#3b82f6;border:none;border-radius:5px;color:#fff;cursor:pointer}
.status{position:fixed;bottom:10px;left:10px;font-size:14px;color:#22c55e}

/* MODE JURI: Sembunyiin setting babak + tombol mulai reset */
.mode-juri.babak-control,.mode-juri.btn-mulai,.mode-juri.btn-reset{display:none!important}

/* MODE DISPLAY: Cuma tampil foto, nama, perguruan, score */
.mode-display.settings-btn,
.mode-display.btn,
.mode-display.input,
.mode-display.babak-btn,
.mode-display.timer,
.mode-display.header{display:none!important}

.mode-display.container{
  flex-direction:column;
  gap:30px;
  padding:40px;
  height:100vh;
}

.mode-display.col{
  border:none;
  padding:20px;
  height:calc(50vh - 30px);
  justify-content:center;
}

.mode-display.atlet-foto{
  width:250px;
  height:250px;
  border-width:5px;
  margin-bottom:20px;
}

.mode-display.title{
  font-size:60px;
  margin:15px 0;
}

.mode-display.perguruan{
  display:block!important;
  font-size:28px;
  color:#ccc;
  margin-bottom:25px;
}

.mode-display.score{
  font-size:220px;
  margin:0;
  line-height:1;
}

.mode-display.label-warna{
  font-size:40px;
  letter-spacing:6px;
  margin-bottom:15px;
}

/* MODE OPERATOR: Tunjukin semua */
.mode-operator.babak-control{display:block}
</style>
</head>
<body>
<div class="header">
  <img id="logoKiri" src="" alt="Logo">
  <span id="judulPerguruan">KEJUARAAN PSHT HALMAHERA SELATAN</span>
  <img id="logoKanan" src="" alt="Logo">
</div>

<div class="container">
  <div class="col biru">
    <div class="label-warna">BIRU</div>
    <img class="atlet-foto" id="fotoBiru" src="https://via.placeholder.com/120" alt="Foto Biru">
    <div class="title" id="namaBiru">ATLET BIRU</div>
    <div class="perguruan" id="perguruanBiru">PERGURUAN BIRU</div>
    <div class="score" id="scoreBiru">0</div>
    <div class="btn-grid">
      <button class="btn" onclick="addScore('biru',1)">+1</button>
      <button class="btn" onclick="addScore('biru',2)">+2</button>
      <button class="btn" onclick="addScore('biru',3)">+3</button>
    </div>
  </div>

  <div class="col tengah">
    <div class="timer" id="timer">03:00</div>
    <div class="babak-control">
      <button class="babak-btn active" onclick="setBabak(1)">BABAK 1</button>
      <button class="babak-btn" onclick="setBabak(2)">BABAK 2</button>
      <button class="babak-btn" onclick="setBabak(3)">BABAK 3</button>
      <button class="babak-btn btn-mulai" id="btnMulai" onclick="toggleTimer()">MULAI</button>
      <button class="babak-btn btn-reset" onclick="resetAll()">RESET</button>
    </div>
  </div>

  <div class="col merah">
    <div class="label-warna">MERAH</div>
    <img class="atlet-foto" id="fotoMerah" src="https://via.placeholder.com/120" alt="Foto Merah">
    <div class="title" id="namaMerah">ATLET MERAH</div>
    <div class="perguruan" id="perguruanMerah">PERGURUAN MERAH</div>
    <div class="score" id="scoreMerah">0</div>
    <div class="btn-grid">
      <button class="btn" onclick="addScore('merah',1)">+1</button>
      <button class="btn" onclick="addScore('merah',2)">+2</button>
      <button class="btn" onclick="addScore('merah',3)">+3</button>
    </div>
  </div>
</div>

<button class="settings-btn" onclick="toggleSettings()">⚙️</button>
<div class="settings-panel" id="settingsPanel">
  <h3>Pilih Mode</h3>
  <select id="modeSelect" style="width:100%;padding:10px;background:#222;color:#fff;border-radius:8px;margin-bottom:15px">
    <option value="operator">MODE OPERATOR</option>
    <option value="juri">MODE JURI</option>
    <option value="display">MODE DISPLAY</option>
  </select>

  <div id="settingOperator">
    <h3>Judul & Logo</h3>
    <input id="judulInput" placeholder="Nama Kejuaraan">
    <input type="file" id="logoKiriInput" accept="image/*">
    <input type="file" id="logoKananInput" accept="image/*">

    <h3>Atlet Biru</h3>
    <input id="inputNamaBiru" placeholder="Nama Atlet Biru">
    <input id="inputPerguruanBiru" placeholder="Nama Perguruan Biru">
    <input type="file" id="fotoBiruInput" accept="image/*">

    <h3>Atlet Merah</h3>
    <input id="inputNamaMerah" placeholder="Nama Atlet Merah">
    <input id="inputPerguruanMerah" placeholder="Nama Perguruan Merah">
    <input type="file" id="fotoMerahInput" accept="image/*">

    <button onclick="saveAll()" style="width:100%;padding:12px;margin-top:10px;background:#22c55e;border:none;border-radius:8px;color:#fff;font-weight:bold;cursor:pointer">SIMPAN SEMUA</button>
  </div>
</div>

<div class="status" id="status">Connecting...</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, onValue, update, get, set } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const app = initializeApp({
  databaseURL: "https://juri-silat-psht-by-4n4n9-default-rtdb.asia-southeast1.firebasedatabase.app/"
});
const db = getDatabase(app);
const dataRef = ref(db, 'match');

let mode = localStorage.getItem('juriMode') || 'operator';
let timerInterval = null;
let isRunning = false;

document.getElementById('modeSelect').value = mode;
applyMode();

window.toggleSettings = () => document.getElementById('settingsPanel').classList.toggle('active');

function applyMode() {
  document.body.classList.remove('mode-juri','mode-display','mode-operator');
  document.body.classList.add('mode-' + mode);

  if(mode!== 'operator') {
    document.getElementById('settingOperator').style.display = 'none';
  } else {
    document.getElementById('settingOperator').style.display = 'block';
  }
}

document.getElementById('modeSelect').onchange = (e) => {
  mode = e.target.value;
  localStorage.setItem('juriMode', mode);
  applyMode();
  location.reload();
}

async function initData() {
  const snap = await get(dataRef);
  if(!snap.exists()) {
    await set(dataRef, {
      biru: 0, merah: 0, timer: 180, babak: 1,
      namaBiru: 'ATLET BIRU', namaMerah: 'ATLET MERAH',
      perguruanBiru: 'PERGURUAN BIRU', perguruanMerah: 'PERGURUAN MERAH',
      judul: 'KEJUARAAN PSHT HALMAHERA SELATAN',
      fotoBiru: 'https://via.placeholder.com/120',
      fotoMerah: 'https://via.placeholder.com/120',
      logoKiri: '', logoKanan: ''
    });
  }
}
initData();

onValue(dataRef, (snap) => {
  const d = snap.val();
  if(!d) return;

  document.getElementById('scoreBiru').textContent = d.biru;
  document.getElementById('scoreMerah').textContent = d.merah;
  document.getElementById('namaBiru').textContent = d.namaBiru;
  document.getElementById('namaMerah').textContent = d.namaMerah;
  document.getElementById('perguruanBiru').textContent = d.perguruanBiru;
  document.getElementById('perguruanMerah').textContent = d.perguruanMerah;
  document.getElementById('judulPerguruan').textContent = d.judul;
  document.getElementById('fotoBiru').src = d.fotoBiru;
  document.getElementById('fotoMerah').src = d.fotoMerah;
  if(d.logoKiri) document.getElementById('logoKiri').src = d.logoKiri;
  if(d.logoKanan) document.getElementById('logoKanan').src = d.logoKanan;

  let m = Math.floor(d.timer/60);
  let s = d.timer%60;
  document.getElementById('timer').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');

  document.querySelectorAll('.babak-btn').forEach((b,i) => {
    b.classList.remove('active');
    if(i === d.babak-1) b.classList.add('active');
  });

  document.getElementById('status').textContent = '✓ Online - ' + mode.toUpperCase();
});

window.addScore = async (warna, nilai) => {
  const snap = await get(dataRef);
  const d = snap.val();
  update(dataRef, {[warna]: d[warna] + nilai});
}

window.toggleTimer = () => {
  if(mode!== 'operator') return;
  isRunning =!isRunning;
  document.getElementById('btnMulai').textContent = isRunning? 'PAUSE' : 'MULAI';
  if(isRunning) {
    timerInterval = setInterval(async () => {
      const snap = await get(dataRef);
      let t = snap.val().timer;
      if(t > 0) update(dataRef, {timer: t - 1});
      else {clearInterval(timerInterval); isRunning = false; document.getElementById('btnMulai').textContent = 'MULAI';}
    }, 1000);
  } else clearInterval(timerInterval);
}

window.resetAll = () => {
  if(mode!== 'operator') return;
  clearInterval(timerInterval);
  isRunning = false;
  update(dataRef, {biru:0, merah:0, timer:180, babak:1});
  document.getElementById('btnMulai').textContent = 'MULAI';
}

window.setBabak = (n) => {
  if(mode!== 'operator') return;
  update(dataRef, {babak: n});
}

window.saveAll = async () => {
  const updateData = {
    namaBiru: document.getElementById('inputNamaBiru').value || 'ATLET BIRU',
    namaMerah: document.getElementById('inputNamaMerah').value || 'ATLET MERAH',
    perguruanBiru: document.getElementById('inputPerguruanBiru').value || 'PERGURUAN BIRU',
    perguruanMerah: document.getElementById('inputPerguruanMerah').value || 'PERGURUAN MERAH',
    judul: document.getElementById('judulInput').value || 'KEJUARAAN PSHT'
  };

  const uploadFile = (input) => {
    return new Promise(resolve => {
      if(input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(input.files[0]);
      } else resolve(null);
    });
  };

  const fotoBiru = await uploadFile(document.getElementById('fotoBiruInput'));
  const fotoMerah = await uploadFile(document.getElementById('fotoMerahInput'));
  const logoKiri = await uploadFile(document.getElementById('logoKiriInput'));
  const logoKanan = await uploadFile(document.getElementById('logoKananInput'));

  if(fotoBiru) updateData.fotoBiru = fotoBiru;
  if(fotoMerah) updateData.fotoMerah = fotoMerah;
  if(logoKiri) updateData.logoKiri = logoKiri;
  if(logoKanan) updateData.logoKanan = logoKanan;

  await update(dataRef, updateData);
  alert('Disimpan Operator!');
  location.reload();
}
</script>
</body>
</html>
